<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h1>Kindle to PDF</h1>

  <div id="status-bar" class="status idle">
    <span id="status-text">待機中</span>
  </div>

  <p class="hint">※ キャプチャしたいページを表示してから開始</p>

  <div class="setting">
    <label for="total-pages">キャプチャ枚数</label>
    <input type="number" id="total-pages" min="1" value="10" />
  </div>

  <div class="setting">
    <label for="delay">最大待機時間 (ms)</label>
    <input type="number" id="delay" min="2000" step="1000" value="2000" />
  </div>

  <div class="setting">
    <label for="chunk-size">PDF分割単位 (ページ)</label>
    <input type="number" id="chunk-size" min="10" step="10" value="50" />
  </div>

  <div class="progress-container" id="progress-container" style="display:none;">
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <span id="progress-text">0 / 0</span>
  </div>

  <div class="actions">
    <button id="btn-start" class="btn primary">キャプチャ開始</button>
    <button id="btn-stop" class="btn danger" disabled>停止</button>
    <button id="btn-download" class="btn success" disabled>PDF ダウンロード</button>
  </div>

  <div id="preview-area"></div>

  <script src="db.js"></script>
  <script src="lib/jspdf.umd.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
